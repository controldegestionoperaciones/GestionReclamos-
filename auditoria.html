<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auditoría — Plataforma de gestión</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --w:#fff;--g50:#f9fafb;--g100:#f3f4f6;--g200:#e5e7eb;--g300:#d1d5db;
  --g400:#9ca3af;--g500:#6b7280;--g600:#4b5563;--g700:#374151;--g800:#1f2937;--g900:#111827;
  --b50:#eff6ff;--b100:#dbeafe;--b400:#60a5fa;--b500:#3b82f6;--b600:#2563eb;--b700:#1d4ed8;
  --gr50:#f0fdf4;--gr100:#dcfce7;--gr500:#22c55e;--gr600:#16a34a;--gr700:#15803d;
  --r50:#fef2f2;--r100:#fee2e2;--r500:#ef4444;--r600:#dc2626;
  --a50:#fffbeb;--a500:#f59e0b;--a600:#d97706;
  --p50:#f5f3ff;--p500:#8b5cf6;--p600:#7c3aed;
  --au50:#fffbeb;--au100:#fef3c7;--au600:#d97706;--au700:#b45309;
  --rad:7px;--rad-lg:11px;
  font-family:'Inter',system-ui,sans-serif;font-size:14px;color:var(--g700);
}
body{background:var(--g50);min-height:100vh}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:208px;min-width:208px;background:var(--w);border-right:1px solid var(--g200);display:flex;flex-direction:column}
.sb-logo{padding:15px 15px 12px;border-bottom:1px solid var(--g100);display:flex;align-items:center;gap:9px}
.sb-logo-icon{width:29px;height:29px;border-radius:var(--rad);background:var(--au600);color:#fff;font-size:15px;display:flex;align-items:center;justify-content:center}
.sb-logo h1{font-size:13px;font-weight:600;color:var(--g900)}
.sb-logo p{font-size:10px;color:var(--g400);margin-top:1px}
.sb-nav{flex:1;padding:10px 8px;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:var(--rad);cursor:pointer;font-size:12px;color:var(--g600);transition:all .11s;margin-bottom:1px}
.nav-item.active{background:var(--au50);color:var(--au700);font-weight:500}
.sb-footer{padding:9px 12px;border-top:1px solid var(--g100);display:flex;align-items:center;gap:8px}
.sf-name{font-size:11px;font-weight:500;color:var(--g800);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btn-out{padding:3px 7px;border:1px solid var(--g200);border-radius:5px;background:transparent;color:var(--g400);font-size:10px;cursor:pointer;font-family:inherit}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:48px;background:var(--w);border-bottom:1px solid var(--g200);display:flex;align-items:center;padding:0 18px;gap:10px}
.topbar h2{font-size:14px;font-weight:600;color:var(--g900);flex:1}
.badge-ro{background:var(--au100);color:var(--au700);font-size:10px;font-weight:600;padding:3px 9px;border-radius:12px;border:1px solid var(--au600)}
.content{flex:1;overflow-y:auto;padding:18px 20px}
.search{background:var(--w);border:1px solid var(--g200);border-radius:var(--rad);padding:6px 10px;font-size:12px;color:var(--g700);font-family:inherit;outline:none}
.search:focus{border-color:var(--b400)}
.shdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.shdr h2{font-size:13px;font-weight:600;color:var(--g900)}
.tw{background:var(--w);border:1px solid var(--g200);border-radius:var(--rad-lg);overflow:hidden}
table{width:100%;border-collapse:collapse}
thead th{text-align:left;font-size:12px;font-weight:700;color:var(--g800);text-transform:uppercase;letter-spacing:.03em;padding:11px 13px;border-bottom:1px solid var(--g200);background:var(--g50)}
tbody td{padding:10px 11px;border-bottom:1px solid var(--g100);font-size:12px;color:var(--g600);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--au50);cursor:pointer}
.tid{font-family:'Courier New',monospace;font-size:10px;font-weight:700;color:var(--b600)}
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:5px;font-size:10px;font-weight:600}
.bn{background:var(--b50);color:var(--b700)}
.ba{background:var(--p50);color:var(--p600)}
.bfin{background:var(--gr100);color:var(--gr700);border:1px solid var(--gr500)}
.breo{background:var(--r50);color:var(--r600)}
.empty{text-align:center;padding:40px;color:var(--g400)}
/* Panel detalle */
.overlay{position:fixed;inset:0;background:rgba(17,24,39,.3);z-index:50;display:flex;align-items:flex-start;justify-content:flex-end}
.panel{background:var(--w);width:540px;height:100vh;overflow-y:auto;border-left:1px solid var(--g200)}
.ph{padding:15px 18px;border-bottom:1px solid var(--g200);position:sticky;top:0;background:var(--w);z-index:5}
.close{padding:4px;border:none;background:none;color:var(--g400);cursor:pointer;font-size:15px}
.pbody{padding:18px}
.dsec{margin-bottom:18px}
.dsec-title{font-size:9px;font-weight:600;color:var(--g400);text-transform:uppercase;letter-spacing:.06em;margin-bottom:9px}
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.dfield{background:var(--g50);border-radius:var(--rad);padding:8px 10px;border:1px solid var(--g100)}
.dlbl{font-size:9px;font-weight:600;color:var(--g400);text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px}
.dval{font-size:12px;color:var(--g900);font-weight:500}
.toast-wrap{position:fixed;bottom:18px;right:18px;z-index:999;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast{background:var(--w);border:1px solid var(--g200);border-radius:var(--rad-lg);padding:9px 13px;font-size:12px;color:var(--g700);max-width:280px;box-shadow:0 4px 12px rgba(0,0,0,.08)}
.toast.ok{border-left:3px solid var(--gr500)}
.toast.err{border-left:3px solid var(--r500)}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:var(--rad);font-size:12px;font-weight:500;cursor:pointer;border:none;font-family:inherit}
.btn-ghost{background:transparent;color:var(--g600);border:1px solid var(--g200)}
.btn-ghost:hover{background:var(--g50)}
.readonly-banner{background:var(--au50);border:1px solid var(--au100);border-radius:var(--rad);padding:7px 11px;font-size:11px;color:var(--au700);margin-bottom:14px;display:flex;align-items:center;gap:6px}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;color:var(--g400);font-size:13px;gap:10px}
.spin{width:32px;height:32px;border:3px solid var(--g200);border-top-color:var(--b600);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="root"></div>
<div class="toast-wrap" id="toasts"></div>

<script>
var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyJAgpnzn_Mh2If-riym1DjMUS-9NBwmt_toi3LqAaXH8r-dAfEzZsfHLe1Pt6h4IztMg/exec';

// ── Auth ──────────────────────────────────────────────────────
var currentUser = (function(){
  // Acceso directo desde el mail de notificación de nuevo reclamo: si la
  // URL trae token/email/profile (link "Ver detalle del reclamo"), los
  // guardamos en la sesión para no pedir el login de Google de nuevo.
  try{
    var qp=new URLSearchParams(window.location.search);
    var qToken=qp.get('token'), qEmail=qp.get('email'), qProfile=qp.get('profile');
    if(qToken && qEmail && qProfile==='auditoria'){
      sessionStorage.setItem('ro_token',qToken);
      sessionStorage.setItem('ro_email',qEmail);
      sessionStorage.setItem('ro_name',qp.get('name')||qEmail.split('@')[0]);
      sessionStorage.setItem('ro_profile','auditoria');
    }
  }catch(e){}

  var token = sessionStorage.getItem('ro_token');
  var email = sessionStorage.getItem('ro_email');
  var name  = sessionStorage.getItem('ro_name');
  var prof  = sessionStorage.getItem('ro_profile');
  if (!token || !email || prof !== 'auditoria') { window.location.href = 'index.html'; return null; }
  return { token: token, email: email, name: name };
})();

var tickets = [];
var loading = true;
var selectedTicket = null;
var searchInput = '';
var searchQ = '';
var filtroCliente = '';
var filtroEstado = '';
var filtroFechaDesde = '';
var filtroFechaHasta = '';
var ordenFecha = 'desc';
var ordenMonto = '';

// ── Helpers ───────────────────────────────────────────────────
function toast(msg, tipo) {
  var w = document.getElementById('toasts'), d = document.createElement('div');
  d.className = 'toast ' + (tipo||''); d.textContent = msg; w.appendChild(d);
  setTimeout(function(){ d.remove(); }, 3200);
}
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDate(s){ if(!s)return'—'; if(s.includes('/'))return s; var d=s.slice(0,10).split('-'); return d.length<3?s:d[2]+'/'+d[1]+'/'+d[0]; }
function getBC(e){ return {'Recibido':'bn','En análisis':'ba','Finalizado':'bfin','Re abierto':'breo'}[e]||'bn'; }

function ticketDateValue(t) {
  var s = t.creado||'';
  if (s.includes('/')) { var p=s.split(' ')[0].split('/'); return p.length===3?p[2]+'-'+p[1]+'-'+p[0]:''; }
  return s.slice(0,10);
}

// ── API ───────────────────────────────────────────────────────
async function api(body) {
  body.token = sessionStorage.getItem('ro_token') || '';
  var r = await fetch(APPS_SCRIPT_URL, {
    method:'POST', redirect:'follow',
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body: JSON.stringify(body)
  });
  var data = await r.json();
  if (data && data.error && data.error.includes('Token')) {
    toast('Tu sesión expiró. Por favor volvé a ingresar.','err');
    setTimeout(function(){ sessionStorage.clear(); window.location.href='index.html'; }, 2500);
    throw new Error('Token expirado');
  }
  return data;
}

// Descarga de adjuntos (igual que comercial/operaciones)
window.abrirAdjunto = async function(e, fileId, nombreEnc, urlDirecta) {
  e.preventDefault();
  var nombre = decodeURIComponent(nombreEnc);
  if (!fileId || fileId==='undefined' || fileId==='') return;
  try {
    toast('Descargando archivo...','ok');
    var res = await api({ action:'getFileUrl', fileId:fileId, nombre:nombre });
    if (!res.ok) { toast('No se pudo obtener el archivo: '+(res.error||''),'err'); return; }
    var byteChars = atob(res.base64.replace(/[\s]/g,''));
    var byteArr = new Uint8Array(byteChars.length);
    for (var i=0;i<byteChars.length;i++) byteArr[i]=byteChars.charCodeAt(i);
    var blob = new Blob([byteArr],{type:res.mimeType});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href=url; a.download=res.nombre||nombre;
    document.body.appendChild(a); a.click();
    setTimeout(function(){ document.body.removeChild(a); URL.revokeObjectURL(url); },1000);
  } catch(err){ toast('Error: '+err.message,'err'); }
};

// ── Carga de datos ────────────────────────────────────────────
async function loadData() {
  try {
    var r = await api({ action:'getTickets', esAuditor:true });
    tickets = r.tickets || [];
    // Parsear campos JSON si vienen como string
    tickets.forEach(function(t){
      if (typeof t.historial === 'string') try{ t.historial=JSON.parse(t.historial); }catch(e){ t.historial=[]; }
      if (typeof t.comentarios === 'string') try{ t.comentarios=JSON.parse(t.comentarios); }catch(e){ t.comentarios=[]; }
      if (typeof t.adjuntos === 'string') try{ t.adjuntos=JSON.parse(t.adjuntos); }catch(e){ t.adjuntos=[]; }
    });
  } catch(e){ console.error(e); }
  loading = false;
  render();
  // Deep link: si la URL trae ?id=REC-XXXXXX (por ej. desde el mail de
  // notificación de nuevo reclamo), abrimos directo el panel de detalle.
  try{
    var idParam=new URLSearchParams(window.location.search).get('id');
    if(idParam) openPanel(idParam);
  }catch(e){}
}

// ── Filtrado ──────────────────────────────────────────────────
function getFiltered() {
  var list = tickets.slice();
  if (searchQ) {
    var q = searchQ.toLowerCase();
    list = list.filter(function(t){
      return (t.ID||'').toLowerCase().includes(q)
        || (t.tipo_reclamo||'').toLowerCase().includes(q)
        || (t.empresa||t.titular||'').toLowerCase().includes(q)
        || (t.detalle||'').toLowerCase().includes(q);
    });
  }
  if (filtroCliente) list = list.filter(function(t){ return (t.empresa||t.titular||t.email_cliente||'')===filtroCliente; });
  if (filtroEstado)  list = list.filter(function(t){ return (t.estado||'')===filtroEstado; });
  if (filtroFechaDesde) list = list.filter(function(t){ return ticketDateValue(t)>=filtroFechaDesde; });
  if (filtroFechaHasta) list = list.filter(function(t){ return ticketDateValue(t)<=filtroFechaHasta; });

  list.sort(function(a,b){
    if (ordenMonto) {
      var ma=parseFloat(String(a.monto||'0').replace(/[^0-9.-]/g,''))||0;
      var mb=parseFloat(String(b.monto||'0').replace(/[^0-9.-]/g,''))||0;
      return ordenMonto==='asc'?ma-mb:mb-ma;
    }
    var da=new Date(ticketDateValue(a)), db=new Date(ticketDateValue(b));
    return ordenFecha==='asc'?da-db:db-da;
  });
  return list;
}

function ejecutarBusqueda() {
  var inp = document.getElementById('search-inp');
  searchQ = inp ? inp.value : searchInput;
  render();
}

// ── Render principal ──────────────────────────────────────────
function render() {
  var root = document.getElementById('root');
  if (loading) {
    root.innerHTML = '<div class="loading"><div class="spin"></div><span>Cargando tickets...</span></div>';
    return;
  }
  var filtered = getFiltered();
  var clientesDisponibles = Array.from(new Set(tickets.map(function(t){ return t.empresa||t.titular||t.email_cliente||''; }).filter(Boolean)));
  var estadosDisponibles = ['Recibido','En análisis','Finalizado','Re abierto'];

  root.innerHTML = `
  <div class="app">
    <div class="sidebar">
      <div class="sb-logo">
        <div class="sb-logo-icon">🔍</div>
        <div><h1>Plataforma de gestión</h1><p>Auditoría</p></div>
      </div>
      <div class="sb-nav">
        <div class="nav-item active">🎫 Ticketera</div>
      </div>
      <div class="sb-footer">
        <div style="font-size:18px">👤</div>
        <div class="sf-name">${esc(currentUser.name)}</div>
        <button class="btn-out" onclick="sessionStorage.clear();window.location.href='index.html'">Salir</button>
      </div>
    </div>
    <div class="main">
      <div class="topbar">
        <h2>Ticketera</h2>
        <span class="badge-ro">🔍 Auditoría — Solo lectura</span>
      </div>
      <div class="content">
        <div class="readonly-banner">🔒 Solo podés ver el detalle de los tickets. No podés modificarlos ni agregar información.</div>
        <div class="shdr">
          <h2>Total de tickets (${filtered.length})</h2>
        </div>
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px">
          <input class="search" id="search-inp" placeholder="🔍 Buscar ticket..." style="width:200px" value="${esc(searchInput)}"
            oninput="searchInput=this.value;ejecutarBusqueda()"
            onkeydown="if(event.key==='Enter'){ejecutarBusqueda()}">
          <select class="search" style="width:160px" onchange="filtroCliente=this.value;render()">
            <option value="">Todos los clientes</option>
            ${clientesDisponibles.map(function(c){ return '<option value="'+esc(c)+'" '+(filtroCliente===c?'selected':'')+'>'+esc(c)+'</option>'; }).join('')}
          </select>
          <select class="search" style="width:140px" onchange="filtroEstado=this.value;render()">
            <option value="">Todos los estados</option>
            ${estadosDisponibles.map(function(e){ return '<option value="'+e+'" '+(filtroEstado===e?'selected':'')+'>'+e+'</option>'; }).join('')}
          </select>
          <span style="font-size:11px;color:var(--g400)">Desde</span>
          <input class="search" type="date" style="width:135px" value="${filtroFechaDesde}" onchange="filtroFechaDesde=this.value;render()">
          <span style="font-size:11px;color:var(--g400)">Hasta</span>
          <input class="search" type="date" style="width:135px" value="${filtroFechaHasta}" onchange="filtroFechaHasta=this.value;render()">
          ${(filtroCliente||filtroEstado||filtroFechaDesde||filtroFechaHasta||searchQ)
            ? '<button class="btn btn-ghost" onclick="filtroCliente=\'\';filtroEstado=\'\';filtroFechaDesde=\'\';filtroFechaHasta=\'\';searchQ=\'\';searchInput=\'\';render()">✕ Limpiar</button>'
            : ''}
        </div>
        <div class="tw">
          <table>
            <thead><tr>
              <th>ID</th>
              <th style="cursor:pointer;user-select:none;white-space:nowrap" onclick="ordenFecha=ordenFecha==='desc'?'asc':'desc';ordenMonto='';render()">
                Fecha <span style="color:${!ordenMonto?'var(--b600)':'var(--g400)'}">${!ordenMonto?(ordenFecha==='asc'?'↑':'↓'):'⇅'}</span>
              </th>
              <th>Tipo</th>
              <th>Cliente</th>
              <th style="cursor:pointer;user-select:none;white-space:nowrap" onclick="ordenMonto=ordenMonto==='desc'?'asc':'desc';ordenFecha='';render()">
                Monto <span style="color:${ordenMonto?'var(--b600)':'var(--g400)'}">${ordenMonto==='asc'?'↑':ordenMonto==='desc'?'↓':'⇅'}</span>
              </th>
              <th>Estado</th>
            </tr></thead>
            <tbody>
              ${filtered.length === 0
                ? '<tr><td colspan="6" class="empty"><div style="font-size:36px;opacity:.4;margin-bottom:10px">🎫</div><p>No hay tickets</p></td></tr>'
                : filtered.map(function(t){
                    return '<tr onclick="openPanel(\'' + esc(t.ID) + '\')">'
                      + '<td><span class="tid">' + (t.ID||'—') + '</span></td>'
                      + '<td>' + fmtDate(t.creado) + '</td>'
                      + '<td>' + esc(t.tipo_reclamo||'—') + '</td>'
                      + '<td style="font-size:11px">' + esc(t.empresa||t.titular||'—') + '</td>'
                      + '<td>' + (t.monto||'—') + '</td>'
                      + '<td><span class="badge ' + getBC(t.estado) + '">' + (t.estado||'—') + '</span></td>'
                      + '</tr>';
                  }).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>`;
}

// ── Panel de detalle (solo lectura) ───────────────────────────
window.openPanel = function(id) {
  selectedTicket = tickets.find(function(x){ return x.ID===id; });
  if (!selectedTicket) return;
  renderPanel();
};

function renderPanel() {
  var t = selectedTicket;
  if (!t) return;

  var hist = Array.isArray(t.historial) ? t.historial : [];
  var coms = Array.isArray(t.comentarios) ? t.comentarios : [];
  var adjs = Array.isArray(t.adjuntos) ? t.adjuntos : [];

  var existing = document.querySelector('.overlay');
  var scrollY = 0;
  if (existing) { var pOld = existing.querySelector('.panel'); if (pOld) scrollY = pOld.scrollTop; existing.remove(); }

  document.body.insertAdjacentHTML('beforeend', `
  <div class="overlay" onclick="if(event.target.className==='overlay')closePanel()">
    <div class="panel">
      <div class="ph">
        <div style="display:flex;align-items:flex-start;gap:9px">
          <div style="flex:1">
            <div style="display:flex;align-items:center;gap:6px;margin-bottom:5px;flex-wrap:wrap">
              <span class="tid" style="font-size:11px">${t.ID||'—'}</span>
              <span class="badge ${getBC(t.estado)}">${t.estado||'—'}</span>
              <span style="background:var(--au50);color:var(--au700);font-size:9px;font-weight:600;padding:2px 6px;border-radius:4px;border:1px solid var(--au100)">🔍 Solo lectura</span>
            </div>
            <div style="font-size:14px;font-weight:600;color:var(--g900)">${esc(t.titular||t.empresa||'—')}</div>
            <div style="font-size:11px;color:var(--g500);margin-top:3px">${esc(t.tipo_reclamo||'—')}</div>
          </div>
          <button class="close" onclick="closePanel()">✕</button>
        </div>
      </div>
      <div class="pbody">

        <div class="dsec">
          <div class="dsec-title">General</div>
          <div class="dgrid">
            <div class="dfield"><div class="dlbl">Cliente</div><div class="dval">${esc(t.empresa||t.titular||'—')}</div></div>
            <div class="dfield"><div class="dlbl">Tipo</div><div class="dval">${esc(t.tipo_reclamo||'—')}</div></div>
            <div class="dfield"><div class="dlbl">Fecha ingreso</div><div class="dval">${fmtDate(t.creado)}</div></div>
            <div class="dfield"><div class="dlbl">Estado</div><div class="dval"><span class="badge ${getBC(t.estado)}">${t.estado||'—'}</span></div></div>
            ${t.monto ? '<div class="dfield" style="grid-column:span 2"><div class="dlbl">Monto total desconocido</div><div class="dval">'+esc(String(t.monto))+'</div></div>' : ''}
            ${t.detalle ? '<div class="dfield" style="grid-column:span 2"><div class="dlbl">Observaciones</div><div class="dval">'+esc(t.detalle)+'</div></div>' : ''}
            ${t.modalidad ? '<div class="dfield"><div class="dlbl">Modalidad</div><div class="dval">'+esc(t.modalidad)+'</div></div>' : ''}
            ${t.sucursal ? '<div class="dfield"><div class="dlbl">Sucursal</div><div class="dval">'+esc(t.sucursal)+'</div></div>' : ''}
            ${t.num_tarjeta ? '<div class="dfield"><div class="dlbl">N° Tarjeta</div><div class="dval">'+esc(t.num_tarjeta)+'</div></div>' : ''}
            ${t.num_secuencia ? '<div class="dfield"><div class="dlbl">N° Secuencia</div><div class="dval">'+esc(t.num_secuencia)+'</div></div>' : ''}
          </div>
        </div>

        <div class="dsec">
          <div class="dsec-title">Historial</div>
          ${hist.length === 0
            ? '<p style="font-size:12px;color:var(--g400)">Sin historial</p>'
            : hist.map(function(h){ return '<div style="border-left:2px solid var(--g200);padding:5px 10px;margin-bottom:6px;font-size:11px;color:var(--g600)"><strong style="color:var(--g700)">'+h.ts+'</strong> — '+esc(h.accion)+'</div>'; }).join('')}
        </div>

        ${renderInformeFinalDestacado(adjs)}

        <div class="dsec">
          <div class="dsec-title">Adjuntos del ticket</div>
          ${renderAdjuntos(t, adjs)}
        </div>

        <div class="dsec">
          <div class="dsec-title">Comentarios</div>
          ${renderComentarios(t, coms, adjs)}
        </div>

      </div>
    </div>
  </div>`);
  var pNew = document.querySelector('.overlay .panel');
  if (pNew && scrollY) pNew.scrollTop = scrollY;
}

// Bloque destacado en verde con el informe final, si el ticket ya tiene uno.
function renderInformeFinalDestacado(adjs) {
  var files = (adjs||[]).filter(function(a){ return a.tipo === 'informe_final'; });
  if (!files.length) return '';
  return '<div class="dsec">'
    + '<div class="dsec-title" style="color:var(--gr700)">✅ Informe final</div>'
    + '<div style="display:flex;flex-direction:column;gap:6px">'
    + files.map(function(a){
        var fid=a.fileId||'', u=a.url||'';
        return '<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--gr50);border:1px solid var(--gr500);border-radius:var(--rad)">'
          + '<span>📄</span>'
          + '<a href="#" onclick="abrirAdjunto(event,\''+fid+'\',\''+encodeURIComponent(a.nombre||'')+'\',\''+u+'\')" style="flex:1;color:var(--b600);text-decoration:underline;font-weight:500">'+esc(a.nombre)+'</a>'
          + '<span style="font-size:9px;font-weight:700;color:var(--gr700);background:var(--gr100);padding:2px 7px;border-radius:10px;letter-spacing:.03em">✅ ENVIADO</span>'
          + '</div>';
      }).join('')
    + '</div></div>';
}

function renderAdjuntos(t, adjs) {
  var adj = [];
  if (adjs.length) {
    adjs.forEach(function(a){
      var origen = a.origen||(a.de==='operaciones'?'Operaciones':'Comercial');
      // Los adjuntos duplicados de comentarios viejos (de antes de la
      // corrección) tienen origen "Comercial"/"Operaciones" a secas, sin
      // sufijo descriptivo — los tapamos acá aunque ya estén así guardados.
      if (a.tipo !== 'informe_final' && (origen === 'Comercial' || origen === 'Operaciones')) return;
      // El informe final ya se muestra destacado arriba, acá no se repite.
      if (a.tipo === 'informe_final') return;
      adj.push({ nombre:a.nombre, origen:origen, fileId:a.fileId||a.id||null, url:a.url||null, tipo:a.tipo||null });
    });
  } else {
    if (t.excel_nombre) adj.push({ nombre:t.excel_nombre, origen:'Comercial (planilla)', fileId:t.excel_fileId||null, url:null });
    if (t.carrier_nombre) adj.push({ nombre:t.carrier_nombre, origen:'Comercial (acuse/mail)', fileId:t.carrier_fileId||null, url:null });
  }
  if (!adj.length) return '<p style="font-size:12px;color:var(--g400)">Sin archivos adjuntos</p>';
  return adj.map(function(a){
    var fid=a.fileId||'', u=a.url||'';
    var esInforme = a.tipo === 'informe_final';
    return '<div style="display:flex;align-items:center;gap:8px;padding:7px 10px;border:1px solid '+(esInforme?'var(--gr500)':'var(--g100)')+';background:'+(esInforme?'var(--gr50)':'transparent')+';border-radius:var(--rad);margin-bottom:6px;font-size:12px">'
      + '<span>'+(esInforme?'📄':'📎')+'</span>'
      + ((fid||u)
          ? '<a href="#" onclick="abrirAdjunto(event,\''+fid+'\',\''+encodeURIComponent(a.nombre||'')+'\',\''+u+'\')" style="flex:1;color:var(--b600);text-decoration:underline;font-weight:500">'+esc(a.nombre)+'</a>'
          : '<span style="flex:1;color:var(--g900)">'+esc(a.nombre)+' <span style="color:var(--g400);font-weight:400">(sin vista previa disponible)</span></span>')
      + (esInforme
          ? '<span style="font-size:9px;font-weight:700;color:var(--gr700);background:var(--gr100);padding:2px 7px;border-radius:10px;letter-spacing:.03em">✅ INFORME FINAL</span>'
          : '<span style="font-size:10px;color:var(--g400)">'+esc(a.origen)+'</span>')
      + '</div>';
  }).join('');
}

function renderComentarios(t, coms, adjs) {
  if (!coms.length) return '<p style="font-size:12px;color:var(--g400)">Sin comentarios</p>';
  return coms.map(function(c){
    var esOp = c.de==='operaciones';
    // Comentarios con varios archivos usan c.archivos (array). Los de un
    // solo archivo usan c.archivo/c.fileId. Los más viejos de todos (antes
    // de la corrección) no tienen fileId propio — buscamos ahí de respaldo.
    var archivosComentario = [];
    if (Array.isArray(c.archivos) && c.archivos.length) {
      archivosComentario = c.archivos;
    } else if (c.archivo) {
      var adjFileId = c.fileId || null;
      if (!adjFileId) {
        var match = adjs.find(function(a){ return a.nombre===c.archivo; });
        if (match) adjFileId = match.fileId||null;
      }
      archivosComentario = [{ nombre: c.archivo, fileId: adjFileId }];
    }
    return '<div style="border-left:2px solid '+(esOp?'var(--p500)':'var(--b500)')+';padding:7px 11px;margin-bottom:7px;background:'+(esOp?'var(--p50)':'var(--b50)')+';border-radius:0 var(--rad) var(--rad) 0">'
      + '<div style="font-size:10px;font-weight:600;color:'+(esOp?'var(--p600)':'var(--b700)')+';margin-bottom:2px">'+(esOp?'⚙️ Operaciones':'💼 Comercial')+' · '+esc(c.usuario||'')+' · '+esc(c.ts||'')+'</div>'
      + '<div style="font-size:12px;color:var(--g700)">'+esc(c.texto||'')+'</div>'
      + (archivosComentario.length
          ? '<div style="display:flex;flex-direction:column;gap:2px;margin-top:3px">'
              + archivosComentario.map(function(a){
                  return '<div style="font-size:11px">'
                    + (a.fileId
                        ? '<a href="#" onclick="abrirAdjunto(event,\''+a.fileId+'\',\''+encodeURIComponent(a.nombre||'')+'\',\'\')" style="color:var(--b600);text-decoration:underline">📎 '+esc(a.nombre)+'</a>'
                        : '📎 '+esc(a.nombre))
                    + '</div>';
                }).join('')
              + '</div>'
          : '')
      + '</div>';
  }).join('');
}

window.closePanel = function(){ var o=document.querySelector('.overlay'); if(o)o.remove(); selectedTicket=null; };

if (currentUser) { render(); loadData(); }
</script>
</body>
</html>
